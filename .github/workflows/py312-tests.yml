name: py312-tests

# Phase 3 / M4: the golden-master suite (29 tests) on the modern stack.
# The certified 2017 behaviour lives in the golden-master workflow
# (docker, pinned checkouts); both must stay green.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  py312-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install the modern stack
        run: |
          pip install -c constraints-modern.txt \
            "ecreall_dace @ git+https://github.com/michaellaunay/dace.git" \
            "ecreall_pontus @ git+https://github.com/michaellaunay/pontus.git" \
            "ecreall_daceui @ git+https://github.com/michaellaunay/daceui.git" \
            "deform_treepy @ git+https://github.com/ecreall/deform_treepy.git" \
            "html_diff_wrapper @ git+https://github.com/michaellaunay/html_diff_wrapper.git" \
            "graphql-wsgi"
          pip install -c constraints-modern.txt \
            "graphene==1.4.2" "graphql-core==1.1" "graphql-relay==0.4.5"
          pip install -c constraints-modern.txt zope.testrunner -e .
      - name: Port the graphene-1 era stack in place
        run: |
          # locate WITHOUT importing: the era stack crashes on import
          # until this very tool has patched it (bootstrap paradox)
          SP=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          python tools/patch_graphql1_py312.py \
            "$SP/graphql" "$SP/graphene" "$SP/graphql_relay" "$SP/promise"
      - name: Run the golden-master suite on Python 3.12
        run: |
          python -m zope.testrunner --test-path=. -s novaideo
