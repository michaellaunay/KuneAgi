[tox]
envlist = py312

[testenv]
constrain_package_deps = true
usedevelop = true
deps =
    -c constraints-modern.txt
    ecreall_dace @ git+https://github.com/michaellaunay/dace.git
    ecreall_pontus @ git+https://github.com/michaellaunay/pontus.git
    ecreall_daceui @ git+https://github.com/michaellaunay/daceui.git
    deform_treepy @ git+https://github.com/ecreall/deform_treepy.git
    html_diff_wrapper @ git+https://github.com/michaellaunay/html_diff_wrapper.git
    graphql_wsgi @ git+https://github.com/faassen/graphql-wsgi.git
    zope.testrunner
commands_pre =
    python tools/patch_graphql1_py312.py \
        {envsitepackagesdir}/graphql \
        {envsitepackagesdir}/graphene \
        {envsitepackagesdir}/graphql_relay
commands =
    python -m zope.testrunner --test-path=. -s novaideo {posargs}
